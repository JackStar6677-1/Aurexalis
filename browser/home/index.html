<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Aurexalis</title>
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <div class="ax-background" aria-hidden="true"></div>

    <header class="top-bar">
      <a class="settings-link" href="../settings/index.html" title="Ajustes Aurexalis" aria-label="Ajustes">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path
            fill="currentColor"
            d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.63-.94l-.36-2.54A.484.484 0 0 0 14 2h-4a.49.49 0 0 0-.49.42l-.36 2.54c-.59.24-1.13.57-1.63.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.04.71 1.63.94l.36 2.54c.05.24.24.41.49.41h4c.25 0 .44-.17.49-.42l.36-2.54c.59-.24 1.13-.56 1.63-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"
          />
        </svg>
      </a>
      <div class="clock" aria-live="polite">
        <time id="ax-time">00:00</time>
        <span id="ax-date">---</span>
      </div>
    </header>

    <main class="stage">
      <section class="hero" aria-label="Aurexalis">
        <div class="logo" aria-hidden="true">
          <span class="logo-mark">A</span>
        </div>
        <h1 class="brand">Aurexalis</h1>
      </section>

      <form id="ax-search" class="search" role="search" action="https://duckduckgo.com/" method="get">
        <input
          id="ax-query"
          name="q"
          type="search"
          autocomplete="off"
          spellcheck="false"
          placeholder="Buscar o escribir URL"
          aria-label="Buscar o escribir URL"
        />
        <button type="submit" aria-label="Buscar">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path
              fill="currentColor"
              d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
            />
          </svg>
        </button>
      </form>

      <section class="shortcuts" aria-label="Accesos directos">
        <ul id="ax-shortcuts" class="shortcut-grid"></ul>
      </section>
    </main>

    <dialog id="ax-add-dialog" class="dialog">
      <form method="dialog" id="ax-add-form">
        <h2>Nuevo acceso directo</h2>
        <label>
          Nombre
          <input id="ax-add-label" name="label" required maxlength="32" />
        </label>
        <label>
          URL
          <input id="ax-add-url" name="url" type="url" required placeholder="https://" />
        </label>
        <menu class="dialog-actions">
          <button type="reset" value="cancel">Cancelar</button>
          <button type="submit" value="ok">Guardar</button>
        </menu>
      </form>
    </dialog>

    <script src="home.js" defer></script>
  </body>
</html>
