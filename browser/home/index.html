<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Aurexalis</title>
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <div class="ax-background" aria-hidden="true"></div>

    <header class="clock" aria-live="polite">
      <time id="ax-time">00:00</time>
      <span id="ax-date">---</span>
    </header>

    <main class="stage">
      <section class="hero" aria-label="Aurexalis">
        <div class="logo" aria-hidden="true">
          <span class="logo-mark">A</span>
        </div>
        <h1 class="brand">Aurexalis</h1>
      </section>

      <form id="ax-search" class="search" role="search" action="https://duckduckgo.com/" method="get">
        <input
          id="ax-query"
          name="q"
          type="search"
          autocomplete="off"
          spellcheck="false"
          placeholder="Buscar o escribir URL"
          aria-label="Buscar o escribir URL"
        />
        <button type="submit" aria-label="Buscar">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path
              fill="currentColor"
              d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
            />
          </svg>
        </button>
      </form>

      <section class="shortcuts" aria-label="Accesos directos">
        <ul id="ax-shortcuts" class="shortcut-grid"></ul>
      </section>
    </main>

    <dialog id="ax-add-dialog" class="dialog">
      <form method="dialog" id="ax-add-form">
        <h2>Nuevo acceso directo</h2>
        <label>
          Nombre
          <input id="ax-add-label" name="label" required maxlength="32" />
        </label>
        <label>
          URL
          <input id="ax-add-url" name="url" type="url" required placeholder="https://" />
        </label>
        <menu class="dialog-actions">
          <button type="reset" value="cancel">Cancelar</button>
          <button type="submit" value="ok">Guardar</button>
        </menu>
      </form>
    </dialog>

    <script src="home.js" defer></script>
  </body>
</html>
