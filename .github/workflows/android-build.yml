name: Android Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "browser/home/**"
      - "browser/settings/**"
      - "tools/sync-mobile-assets.*"
      - ".github/workflows/android-build.yml"
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [main]
    paths:
      - "mobile/**"
      - "browser/home/**"
      - "browser/settings/**"
      - "tools/sync-mobile-assets.*"
      - ".github/workflows/android-build.yml"
    paths-ignore:
      - "**.md"

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-apk:
    name: build android apk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync version from Cargo.toml
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version' crates/aurexalis-shell/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          IFS=. read -r MA MI PA <<< "$VERSION"
          CODE=$((MA * 10000 + MI * 100 + PA))
          printf 'versionName=%s\nversionCode=%s\n' "$VERSION" "$CODE" > mobile/android/version.properties

      - name: Sync mobile web assets
        run: bash ./tools/sync-mobile-assets.sh

      - name: Generate release keystore
        run: |
          mkdir -p mobile/android/keystore
          keytool -genkeypair -v \
            -keystore mobile/android/keystore/aurexalis-release.jks \
            -storepass aurexalis \
            -alias aurexalis \
            -keypass aurexalis \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Aurexalis Mobile, OU=CI, O=Aurexalis, L=Local, S=Local, C=ES"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Gradle wrapper
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurexalis-android-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
