name: Rust

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "assets/**"
  pull_request:
    branches: [main]

concurrency:
  group: rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  quality-linux:
    name: quality (linux)
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify browser pack integration
        shell: pwsh
        run: ./tools/verify-browser-pack.ps1 -RepoRoot .

      - name: Check workspace (sin instalador GUI)
        run: cargo check --workspace --exclude aurexalis-installer --all-features

      - name: Run clippy
        run: cargo clippy --workspace --exclude aurexalis-installer --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --exclude aurexalis-installer --all-features

  quality-windows:
    name: quality (windows)
    needs: fmt
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify browser pack integration
        shell: pwsh
        run: ./tools/verify-browser-pack.ps1 -RepoRoot .

      - name: Check workspace
        run: cargo check --workspace --all-features

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-features
