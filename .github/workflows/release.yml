name: Release

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: build windows (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Verify branding assets
        shell: pwsh
        run: |
          if (-not (Test-Path "assets/branding/aurexalis.ico")) {
            python tools/gen_installer_icon.py
          }

      - name: Build release binaries
        run: |
          cargo build --release -p aurexalis-shell --target ${{ matrix.target }}
          cargo build --release -p aurexalis-installer --target ${{ matrix.target }}

      - name: Package runtime zip
        shell: pwsh
        run: |
          $dist = "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $stage = Join-Path $env:RUNNER_TEMP "aurexalis-runtime"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/aurexalis.exe" (Join-Path $stage "aurexalis.exe")
          Copy-Item "browser" (Join-Path $stage "browser") -Recurse
          Copy-Item "LICENSE" (Join-Path $stage "LICENSE")
          New-Item -ItemType Directory -Force -Path (Join-Path $stage "profiles\default") | Out-Null
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath "$dist/aurexalis-runtime-windows-x86_64.zip" -Force

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/aurexalis.exe" "dist/aurexalis-windows-x86_64.exe"
          Copy-Item "target/${{ matrix.target }}/release/Aurexalis-Setup.exe" "dist/Aurexalis-Setup-x86_64.exe"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/aurexalis-windows-x86_64.exe
            dist/aurexalis-runtime-windows-x86_64.zip
            dist/Aurexalis-Setup-x86_64.exe
          generate_release_notes: true
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
