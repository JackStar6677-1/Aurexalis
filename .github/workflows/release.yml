name: Release

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  # No cancelar builds en curso: Windows tarda ~12 min y un retag del tag
  # interrumpia el job antes de subir artefactos (solo quedaban zip/tar.gz).
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  windows:
    name: build windows (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Verify branding assets
        shell: pwsh
        run: |
          if (-not (Test-Path "assets/branding/aurexalis.ico")) {
            python tools/gen_installer_icon.py
          }

      - name: Build release binaries
        run: |
          cargo build --release -p aurexalis-shell -p aurexalis-installer --target ${{ matrix.target }}
          if (-not (Test-Path "target/${{ matrix.target }}/release/aurexalis.exe")) {
            throw "aurexalis.exe no se genero"
          }
        shell: pwsh

      - name: Package runtime zip
        shell: pwsh
        run: |
          $dist = "dist"
          $target = "target/${{ matrix.target }}/release"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $stage = Join-Path $env:RUNNER_TEMP "aurexalis-runtime"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "$target/aurexalis.exe" (Join-Path $stage "aurexalis.exe")
          Copy-Item "browser" (Join-Path $stage "browser") -Recurse
          Copy-Item "LICENSE" (Join-Path $stage "LICENSE")
          Copy-Item "assets\branding\aurexalis.ico" (Join-Path $stage "aurexalis.ico")
          New-Item -ItemType Directory -Force -Path (Join-Path $stage "profiles\default") | Out-Null
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath "$dist/aurexalis-runtime-windows-x86_64.zip" -Force

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/aurexalis.exe" "dist/aurexalis-windows-x86_64.exe"
          Copy-Item "target/${{ matrix.target }}/release/Aurexalis-Setup.exe" "dist/Aurexalis-Setup-x86_64.exe"

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/*

  android:
    name: build android (GeckoView)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync version from Cargo.toml
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version' crates/aurexalis-shell/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          IFS=. read -r MA MI PA <<< "$VERSION"
          CODE=$((MA * 10000 + MI * 100 + PA))
          printf 'versionName=%s\nversionCode=%s\n' "$VERSION" "$CODE" > mobile/android/version.properties

      - name: Sync mobile web assets
        run: bash ./tools/sync-mobile-assets.sh

      - name: Generate release keystore
        run: |
          mkdir -p mobile/android/keystore
          keytool -genkeypair -v \
            -keystore mobile/android/keystore/aurexalis-release.jks \
            -storepass aurexalis \
            -alias aurexalis \
            -keypass aurexalis \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Aurexalis Mobile, OU=CI, O=Aurexalis, L=Local, S=Local, C=ES"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Gradle wrapper
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --stacktrace

      - name: Stage Android release asset
        run: |
          mkdir -p dist
          VERSION=$(grep versionName mobile/android/version.properties | cut -d= -f2)
          cp mobile/android/app/build/outputs/apk/release/app-release.apk \
            "dist/Aurexalis-android-${VERSION}-gecko.apk"

      - name: Upload Android release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: dist/Aurexalis-android-*.apk

  linux:
    name: build linux packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm libarchive-tools
          sudo gem install --no-document fpm

      - name: Package Linux (.deb, .rpm, Arch, tarball)
        run: bash ./tools/package-linux.sh

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            dist/aurexalis_*.deb
            dist/aurexalis-*.rpm
            dist/aurexalis-*-x86_64.pkg.tar.zst
            dist/aurexalis-runtime-linux-x86_64.tar.gz

  publish:
    name: publish github release
    needs: [windows, android, linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: dist/windows

      - name: Download Android assets
        uses: actions/download-artifact@v4
        with:
          name: release-android
          path: dist/android

      - name: Download Linux assets
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: dist/linux

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/*
            dist/android/*
            dist/linux/*
          generate_release_notes: true
          draft: false
          prerelease: true
          body: |
            ## Aurexalis ${{ github.ref_name }}

            ### Windows (PC)
            - `Aurexalis-Setup-x86_64.exe` — instalador GUI
            - `aurexalis-windows-x86_64.exe` — launcher/shell
            - `aurexalis-runtime-windows-x86_64.zip` — runtime empaquetado

            ### Android (movil)
            - `Aurexalis-android-*-gecko.apk` — navegador Aurexalis Android (GeckoView)
            - Bloqueador ContentBlocking + ajustes embebidos
            - Instala el APK y habilita *Origen desconocido* si tu dispositivo lo pide

            ### Linux (3 formatos + portable)
            - `aurexalis_*_amd64.deb` — Ubuntu / Debian
            - `aurexalis-*-1.x86_64.rpm` — Fedora / RHEL
            - `aurexalis-*-x86_64.pkg.tar.zst` — Arch Linux
            - `aurexalis-runtime-linux-x86_64.tar.gz` — tarball portable
            - Requiere Firefox o Floorp instalado como motor Gecko
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
